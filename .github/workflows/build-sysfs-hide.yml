name: Build sysfs_hide kernel module
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y bc flex bison libelf-dev libssl-dev clang lld llvm

      - name: Clone kernel at exact emulator commit
        run: |
          git clone https://android.googlesource.com/kernel/common /tmp/android-kernel
          cd /tmp/android-kernel
          git checkout 7e35917775b8
          git clean -fdx
          git checkout -- .

      - name: Prepare kernel for module building
        run: |
          cd /tmp/android-kernel
          cp $GITHUB_WORKSPACE/sysfs-hide/kernel-config .config
          
          # Override setlocalversion to prevent the "+" suffix
          echo '#!/bin/sh' > scripts/setlocalversion
          echo 'echo ""' >> scripts/setlocalversion
          
          # Set exact version in Makefile
          sed -i 's/^EXTRAVERSION =.*/EXTRAVERSION =/' Makefile
          
          # Set config
          sed -i '/CONFIG_LOCALVERSION_AUTO/d' .config
          sed -i '/CONFIG_LOCALVERSION=/d' .config  
          sed -i '/CONFIG_TRIM_UNUSED_KSYMS/d' .config
          echo '# CONFIG_LOCALVERSION_AUTO is not set' >> .config
          echo 'CONFIG_LOCALVERSION="-android14-4-00257-g7e35917775b8-ab9964412"' >> .config
          echo '# CONFIG_TRIM_UNUSED_KSYMS is not set' >> .config
          
          make ARCH=arm64 LLVM=1 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
          make ARCH=arm64 LLVM=1 CROSS_COMPILE=aarch64-linux-gnu- modules_prepare -j$(nproc)
          
          echo "kernel.release: $(cat include/config/kernel.release)"
          # Verify no +
          RELEASE=$(cat include/config/kernel.release)
          if echo "$RELEASE" | grep -q '+'; then
            echo "WARNING: still has +, forcing..."
            echo "6.1.23-android14-4-00257-g7e35917775b8-ab9964412" > include/config/kernel.release
          fi
          echo "FINAL: $(cat include/config/kernel.release)"

      - name: Build module
        run: |
          mkdir -p /tmp/build
          cp sysfs-hide/sysfs_hide.c /tmp/build/sysfs_hide.c
          echo 'obj-m := sysfs_hide.o' > /tmp/build/Makefile
          make -C /tmp/android-kernel M=/tmp/build ARCH=arm64 LLVM=1 CROSS_COMPILE=aarch64-linux-gnu- modules
          modinfo /tmp/build/sysfs_hide.ko
          echo "---"
          strings /tmp/build/sysfs_hide.ko | grep vermagic

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: sysfs_hide_module
          path: /tmp/build/sysfs_hide.ko
